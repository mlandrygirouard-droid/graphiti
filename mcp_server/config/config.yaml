# Graphiti MCP Server Configuration
# LLM: Anthropic Haiku 4.5 | Embeddings: Ollama (local)

server:
  transport: "sse"
  host: "0.0.0.0"
  port: 8000

llm:
  provider: "anthropic"
  model: "claude-haiku-4-5-20251001"
  max_tokens: 8192

  providers:
    anthropic:
      api_key: ${ANTHROPIC_API_KEY:}

embedder:
  provider: "openai"  # Using OpenAI-compatible API (Ollama)
  model: "nomic-embed-text"
  dimensions: 768

  providers:
    openai:
      api_key: "ollama"
      api_url: "http://localhost:11434/v1"

database:
  provider: "falkordb"
  providers:
    falkordb:
      uri: ${FALKORDB_URI:redis://localhost:6379}
      password: ${FALKORDB_PASSWORD:}
      database: ${FALKORDB_DATABASE:default_db}

graphiti:
  group_id: ${GRAPHITI_GROUP_ID:main}
  user_id: "mathieu"
  # Entity types defined in src/models/entity_types.py (Module, Symbol, Task, Bug, Decision)
